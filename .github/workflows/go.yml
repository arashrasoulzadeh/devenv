name: Release Build

on:
  push:
    branches: ["main"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: "1.25"

      - name: Run tests
        run: go test ./... -v -race

      - name: Generate version (commit-based)
        run: |
          echo "VERSION=commit-$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      - name: Prepare release file
        run: |
          mkdir -p dist
          echo "# 🚀 Release $VERSION" > RELEASE.md
          echo "" >> RELEASE.md
          echo "## 📦 Builds + SHA256" >> RELEASE.md
          echo "" >> RELEASE.md

      - name: Build all platforms + SHA256
        run: |
          set -e

          build() {
            OS=$1
            ARCH=$2
            EXT=$3
            NAME=$4

            echo "Building $NAME..."

            OUT="dist/${NAME}${EXT}"

            GOOS=$OS GOARCH=$ARCH go build -ldflags="-s -w" -o "$OUT" .

            SHA=$(shasum -a 256 "$OUT" | awk '{print $1}')

            echo "### $NAME" >> RELEASE.md
            echo "- File: \`${NAME}${EXT}\`" >> RELEASE.md
            echo "- SHA256: \`$SHA\`" >> RELEASE.md
            echo "" >> RELEASE.md
          }

          # Linux
          build linux amd64 "" devenv-linux
          build linux arm64 "" devenv-linux-arm64
          build linux 386 "" devenv-linux-386

          # macOS
          build darwin amd64 "" devenv-macos-intel
          build darwin arm64 "" devenv-macos-arm64

          # Windows
          build windows amd64 ".exe" devenv-windows-amd64
          build windows arm64 ".exe" devenv-windows-arm64

      - name: Show release file
        run: cat RELEASE.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: Release ${{ env.VERSION }}
          body_path: RELEASE.md
          files: |
            dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}